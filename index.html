<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meow meow meow 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0a18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* ── Cat Cursor ────────────────────────────── */
    #catCursor {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 1.25rem;
      transform: translate(-5px, -5px);
      user-select: none;
    }

    /* ── Paw Trail ─────────────────────────────── */
    .paw-trail {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      font-size: .8rem;
      animation: pawFade .65s ease forwards;
      user-select: none;
    }
    @keyframes pawFade {
      0%   { opacity:.9; transform: scale(1) rotate(var(--r)); }
      100% { opacity:0;  transform: scale(1.6) rotate(var(--r)); }
    }

    /* ── BG Floaters ───────────────────────────── */
    #pawBg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .fp { position: absolute; bottom: -50px; opacity: 0; animation: floatUp linear infinite; }
    @keyframes floatUp {
      0%  { opacity:0;   transform: translateY(0) rotate(0deg); }
      8%  { opacity:.08; }
      90% { opacity:.08; }
      100%{ opacity:0;   transform: translateY(-110vh) rotate(340deg); }
    }

    /* ── Walking Cats ──────────────────────────── */
    @keyframes walkRight { from { left: -100px; } to { left: calc(100vw + 100px); } }
    @keyframes walkLeft  { from { left: calc(100vw + 100px); } to { left: -100px; } }

    .wcat-pos { position: fixed; z-index: 15; pointer-events: auto; cursor: pointer; }

    .wcat-flip { display: inline-block; position: relative; animation: wcBob .38s ease-in-out infinite; }
    .wcat-flip.rtl { animation: wcBobR .38s ease-in-out infinite; }
    @keyframes wcBob  { 0%,100%{transform:translateY(0)   scaleX(1) } 50%{transform:translateY(-3px) scaleX(1) } }
    @keyframes wcBobR { 0%,100%{transform:translateY(0)   scaleX(-1)} 50%{transform:translateY(-3px) scaleX(-1)} }

    .wcat-head {
      width: 36px; height: 30px;
      background: var(--cc);
      border-radius: 50%;
      margin: 0 auto;
      position: relative;
      overflow: visible;
    }
    .wcat-head::before, .wcat-head::after {
      content: '';
      position: absolute; top: -9px;
      border-style: solid;
      border-width: 0 6px 10px;
      border-color: transparent transparent var(--cc);
    }
    .wcat-head::before { left: 3px; }
    .wcat-head::after  { right: 3px; }
    .wcat-eyes { display: flex; justify-content: space-around; padding: 8px 7px 0; }
    .wcat-eye  { width: 5px; height: 5px; background: #ffd166; border-radius: 50%; }

    .wcat-body {
      width: 32px; height: 19px;
      background: var(--cc);
      border-radius: 40% 40% 50% 50%;
      margin: -3px auto 0;
      position: relative; overflow: visible;
    }
    .wcat-tail {
      position: absolute;
      left: -13px; bottom: 1px;
      width: 16px; height: 11px;
      border: 3px solid var(--cc);
      border-right: none; border-top: none;
      border-radius: 0 0 0 14px;
      transform-origin: right center;
      animation: wctail .8s ease-in-out infinite;
    }
    @keyframes wctail { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(22deg)} }

    .wcat-legs { display: flex; justify-content: space-around; padding: 0 2px; margin-top: 1px; }
    .wcat-leg  { width: 4px; height: 10px; background: var(--cc); border-radius: 0 0 3px 3px; transform-origin: top center; }
    .wcat-leg:nth-child(odd)  { animation: legA .35s ease-in-out infinite; }
    .wcat-leg:nth-child(even) { animation: legA .35s ease-in-out infinite reverse; }
    @keyframes legA { 0%,100%{transform:rotate(-22deg)} 50%{transform:rotate(22deg)} }

    /* Meow speech bubble */
    .meow-bub {
      position: absolute;
      bottom: calc(100% + 5px); left: 50%;
      transform: translateX(-50%);
      background: rgba(255,110,180,.9);
      color: #fff;
      font-family: 'Fredoka One', cursive;
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      animation: bubPop 2s ease forwards;
      z-index: 20;
    }
    .meow-bub::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 50%; transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: rgba(255,110,180,.9);
      border-bottom: none;
    }
    @keyframes bubPop {
      0%  { opacity:0; transform:translateX(-50%) scale(.7); }
      12% { opacity:1; transform:translateX(-50%) scale(1); }
      70% { opacity:1; }
      100%{ opacity:0; transform:translateX(-50%) translateY(-8px); }
    }

    /* ── Cat Counter Badge ──────────────────────── */
    #catBadge {
      position: fixed; top: 14px; right: 14px;
      background: rgba(255,110,180,.12);
      border: 1px solid rgba(255,110,180,.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-family: 'Fredoka One', cursive;
      font-size: .82rem; color: #ff6eb4;
      z-index: 50; pointer-events: none;
    }

    /* ── Card ───────────────────────────────────── */
    .card {
      position: relative; z-index: 10;
      background: #1c1430;
      border: 1px solid rgba(255,110,180,.18);
      border-radius: 28px;
      padding: 2.4rem 2.4rem 2.8rem;
      width: min(400px, 92vw);
      text-align: center;
      box-shadow: 0 0 70px rgba(255,110,180,.1), 0 24px 60px rgba(0,0,0,.5);
      margin-top: 30px;
    }
    /* Card cat ears */
    .card::before, .card::after {
      content: '';
      position: absolute; top: -30px;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 25px 32px;
      border-color: transparent transparent #1c1430;
      z-index: 11;
    }
    .card::before { left: 22px; }
    .card::after  { right: 22px; }
    .cie {
      position: absolute; top: -21px;
      width: 0; height: 0;
      border-style: solid;
      border-width: 0 15px 20px;
      border-color: transparent transparent #ff6eb4;
      z-index: 12;
    }
    .cie.l { left: 32px; }
    .cie.r { right: 32px; }

    /* Corner cat paws */
    .cc-corner { position: absolute; font-size: .9rem; opacity: .3; user-select: none; }
    .cc-corner.tl { top: 10px;    left: 12px; }
    .cc-corner.tr { top: 10px;    right: 12px; transform: scaleX(-1); }
    .cc-corner.bl { bottom: 10px; left: 12px; }
    .cc-corner.br { bottom: 10px; right: 12px; transform: scaleX(-1); }

    /* ── Main CSS Cat ───────────────────────────── */
    #catWrap {
      width: 110px; height: 150px;
      margin: 0 auto 1rem;
      position: relative;
      animation: bob 3s ease-in-out infinite;
      cursor: pointer;
    }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    #catWrap.happy { animation: woohoo .55s cubic-bezier(.36,1.56,.64,1) forwards; }
    @keyframes woohoo {
      0%  {transform:scale(1)}
      35% {transform:scale(1.18) rotate(-6deg)}
      65% {transform:scale(.95) rotate(5deg)}
      100%{transform:scale(1)}
    }

    .c-head {
      width: 88px; height: 76px;
      background: #342256; border-radius: 50% 50% 44% 44%;
      margin: 0 auto; position: relative; z-index: 2; overflow: visible;
    }
    .c-head::before, .c-head::after {
      content: ''; position: absolute; top: -22px;
      border-style: solid; border-width: 0 13px 22px;
      border-color: transparent transparent #342256;
    }
    .c-head::before { left: 6px; }
    .c-head::after  { right: 6px; }
    .ie  { position: absolute; top: -15px; border-style: solid; border-width: 0 7px 13px; border-color: transparent transparent #ff6eb4; }
    .ie.l { left: 10px; }
    .ie.r { right: 10px; }
    .wgrp { position: absolute; top: 34px; display: flex; flex-direction: column; gap: 5px; }
    .wgrp.wl { left: -32px; align-items: flex-end; }
    .wgrp.wr { right: -32px; align-items: flex-start; }
    .w { display: block; width: 28px; height: 1.5px; background: rgba(255,255,255,.3); border-radius: 2px; }
    .wl .w:nth-child(1){transform:rotate(-7deg)} .wl .w:nth-child(3){transform:rotate(7deg)}
    .wr .w:nth-child(1){transform:rotate(7deg)}  .wr .w:nth-child(3){transform:rotate(-7deg)}
    .eyes { display: flex; justify-content: space-evenly; padding: 18px 8px 0; }
    .eye  { width: 20px; height: 20px; background: #ffd166; border-radius: 50%; position: relative; animation: blink 5s ease-in-out infinite; }
    .eye:last-child { animation-delay: .3s; }
    @keyframes blink { 0%,91%,100%{transform:scaleY(1)} 94%,97%{transform:scaleY(.08)} }
    .pupil { position: absolute; inset: 0; margin: auto; width: 9px; height: 14px; background: #0c0918; border-radius: 50%; }
    .shine { position: absolute; width: 4px; height: 4px; background: rgba(255,255,255,.85); border-radius: 50%; top: 3px; left: 3px; }
    .nose  { width: 0; height: 0; border-style: solid; border-width: 0 4px 7px; border-color: transparent transparent #ff6eb4; margin: 6px auto 0; }
    .mouth { display: flex; justify-content: center; gap: 2px; margin-top: 3px; }
    .ml,.mr { width: 7px; height: 5px; border: 2px solid #9070b0; border-top: none; border-radius: 0 0 8px 8px; }
    .c-body { width: 68px; height: 52px; background: #342256; border-radius: 40% 40% 50% 50%; margin: -8px auto 0; position: relative; overflow: visible; z-index: 1; }
    .tail   { position: absolute; right: -34px; bottom: 4px; width: 50px; height: 20px; border: 5px solid #342256; border-left: none; border-top: none; border-radius: 0 0 28px 0; transform-origin: left center; animation: wag 1.6s ease-in-out infinite; }
    @keyframes wag { 0%,100%{transform:rotate(-12deg)} 50%{transform:rotate(18deg)} }

    /* Main meow pop */
    .main-meow {
      position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
      background: rgba(255,110,180,.9); color: #fff;
      font-family: 'Fredoka One', cursive; font-size: .85rem;
      padding: 3px 10px; border-radius: 10px;
      pointer-events: none; animation: meowFly .9s ease forwards;
    }
    @keyframes meowFly {
      0%  {opacity:1; transform:translateX(-50%) translateY(0)}
      100%{opacity:0; transform:translateX(-50%) translateY(-30px)}
    }

    /* Meow counter */
    #meowCount {
      font-family: 'Fredoka One', cursive;
      font-size: .8rem; color: #ff6eb4;
      min-height: 1.2rem; margin-bottom: .3rem;
    }

    /* ── Cat Divider ────────────────────────────── */
    .catline {
      display: flex; align-items: center; justify-content: center;
      gap: 3px; margin: .5rem 0 .8rem;
      font-size: .7rem; opacity: .22; letter-spacing: 1px;
    }

    /* ── Text ───────────────────────────────────── */
    h1 { font-family: 'Fredoka One', cursive; font-size: 1.85rem; color: #f0e8ff; line-height: 1.25; margin-bottom: .2rem; }
    h1 em { color: #ff6eb4; font-style: normal; }
    .sub  { font-size: .88rem; color: #8870a8; margin-bottom: 1.6rem; }

    /* ── Input ──────────────────────────────────── */
    .field { position: relative; margin-bottom: .9rem; }
    .field::before { content: '🐾'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
    input  { width: 100%; padding: 13px 14px 13px 44px; background: #130e24; border: 2px solid rgba(255,110,180,.22); border-radius: 14px; color: #f0e8ff; font-family: 'Nunito', sans-serif; font-size: .98rem; font-weight: 700; outline: none; transition: border-color .2s, box-shadow .2s; }
    input::placeholder { color: #5a4878; font-weight: 400; }
    input:focus { border-color: #ff6eb4; box-shadow: 0 0 0 4px rgba(255,110,180,.12); }

    /* ── Button ─────────────────────────────────── */
    #btn { width: 100%; padding: 13px; background: linear-gradient(130deg, #ff6eb4, #d946ef); border: none; border-radius: 14px; color: #fff; font-family: 'Fredoka One', cursive; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 22px rgba(255,110,180,.32); transition: transform .15s, box-shadow .15s; }
    #btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,110,180,.44); }
    #btn:active { transform: scale(.97); }

    .note { margin-top: 1rem; font-size: .75rem; color: #4e3d68; }

    /* ── Success Screen ─────────────────────────── */
    #success {
      display: none; position: fixed; inset: 0; background: rgba(10,7,20,.96);
      z-index: 200; flex-direction: column; align-items: center; justify-content: center; gap: .7rem;
    }
    #success.show { display: flex; animation: fadeIn .35s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .s-cats { display: flex; gap: .2rem; font-size: 2.6rem; }
    .s-cats span { animation: catDance .5s ease-in-out infinite; }
    .s-cats span:nth-child(1){animation-delay:0s}   .s-cats span:nth-child(2){animation-delay:.1s}
    .s-cats span:nth-child(3){animation-delay:.2s}   .s-cats span:nth-child(4){animation-delay:.3s}
    .s-cats span:nth-child(5){animation-delay:.4s}   .s-cats span:nth-child(6){animation-delay:.5s}
    .s-cats span:nth-child(7){animation-delay:.6s}
    @keyframes catDance {
      0%,100%{transform:translateY(0) rotate(0deg)}
      25%    {transform:translateY(-9px) rotate(-12deg)}
      75%    {transform:translateY(-4px) rotate(12deg)}
    }
    .s-title { font-family: 'Fredoka One', cursive; font-size: 2.1rem; color: #f0e8ff; }
    .s-title span { color: #ff6eb4; }
    .s-number-box { background: rgba(255,110,180,.12); border: 1.5px solid rgba(255,110,180,.35); border-radius: 16px; padding: .7rem 1.4rem; display: flex; align-items: center; gap: .7rem; cursor: pointer; transition: background .2s; position: relative; z-index: 202; }
    .s-number-box:hover { background: rgba(255,110,180,.2); }
    .s-number { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: #ffd166; letter-spacing: 1px; }
    .copy-btn { background: rgba(255,110,180,.25); border: none; border-radius: 8px; padding: .3rem .7rem; color: #ff6eb4; font-family: 'Nunito', sans-serif; font-size: .78rem; font-weight: 700; cursor: pointer; width: auto; box-shadow: none; }
    .copy-btn:hover { background: rgba(255,110,180,.4); }
    .copy-btn.copied { color: #7cfc00; background: rgba(124,252,0,.15); }
    .s-sub { color: #8870a8; font-size: .95rem; }
    .s-tap { color: #3e2e58; font-size: .73rem; margin-top: .3rem; }

    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 201; }
    .cf { position: absolute; top: -30px; animation: fall linear forwards; }
    @keyframes fall { 0%{opacity:1;transform:translateY(0) rotate(0deg)} 100%{opacity:0;transform:translateY(110vh) rotate(720deg)} }
  </style>
</head>
<body>

  <div id="catCursor">🐱</div>
  <div id="pawBg"></div>
  <div id="catBadge">🐈 <span id="catCount">0</span> cats on screen</div>

  <div class="card">
    <span class="cie l"></span>
    <span class="cie r"></span>
    <span class="cc-corner tl">🐾</span>
    <span class="cc-corner tr">🐾</span>
    <span class="cc-corner bl">🐾</span>
    <span class="cc-corner br">🐾</span>

    <div id="catWrap">
      <div class="c-head">
        <span class="ie l"></span><span class="ie r"></span>
        <div class="wgrp wl"><span class="w"></span><span class="w"></span><span class="w"></span></div>
        <div class="wgrp wr"><span class="w"></span><span class="w"></span><span class="w"></span></div>
        <div class="eyes">
          <div class="eye"><div class="pupil"></div><div class="shine"></div></div>
          <div class="eye"><div class="pupil"></div><div class="shine"></div></div>
        </div>
        <div class="nose"></div>
        <div class="mouth"><div class="ml"></div><div class="mr"></div></div>
      </div>
      <div class="c-body"><div class="tail"></div></div>
    </div>

    <div id="meowCount"></div>

    <h1>purrr… can I have<br><em>your number?</em></h1>
    <div class="catline">🐾🐾🐾🐾🐾🐾🐾🐾🐾</div>
    <p class="sub">I promise I'm not a cat burglar 🐾</p>

    <div class="field">
      <input id="phone" type="tel" placeholder="your digits, pretty please~" />
    </div>
    <button id="btn">give it here 🐾</button>
    <p class="note">🐈 9 lives · only 1 chance to text you 🐈</p>
  </div>

  <div id="success">
    <div id="confetti"></div>
    <div class="s-cats">
      <span>🐱</span><span>🐈</span><span>😸</span><span>😻</span><span>🐈‍⬛</span><span>🐱</span><span>😺</span>
    </div>
    <div class="s-title">yay! <span>she said yes~</span></div>
    <div class="s-number-box" onclick="copyNumber(event)">
      <span class="s-number" id="displayNumber">—</span>
      <button class="copy-btn" id="copyBtn">copy</button>
    </div>
    <p class="s-sub">I'll treat you better than my cat treats me</p>
    <p class="s-tap">tap anywhere else to go back</p>
  </div>

  <script>
    // ── Cat cursor ──────────────────────────────
    const cur = document.getElementById('catCursor');
    const isMobile = 'ontouchstart' in window;
    if (!isMobile) {
      document.body.style.cursor = 'none';
      document.addEventListener('mousemove', e => {
        cur.style.left = e.clientX + 'px';
        cur.style.top  = e.clientY + 'px';
        spawnTrail(e.clientX, e.clientY);
      });
    } else { cur.style.display = 'none'; }

    // ── Paw trail ───────────────────────────────
    let lastPaw = 0;
    function spawnTrail(x, y) {
      const now = Date.now();
      if (now - lastPaw < 130) return;
      lastPaw = now;
      const el = document.createElement('span');
      el.className = 'paw-trail';
      el.textContent = '🐾';
      el.style.left = (x - 8) + 'px';
      el.style.top  = (y - 8) + 'px';
      el.style.setProperty('--r', (Math.random()*60-30) + 'deg');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 680);
    }

    // ── BG floaters ─────────────────────────────
    const bg = document.getElementById('pawBg');
    ['🐾','🐾','🐾','🐾','🐾','✨','💕','🌙','⭐','🐈','🐱','🐾'].forEach(icon => {
      for (let i = 0; i < 3; i++) {
        const el = document.createElement('span');
        el.className = 'fp';
        el.textContent = icon;
        el.style.left             = Math.random()*100 + 'vw';
        el.style.fontSize         = (.7 + Math.random()*1.2) + 'rem';
        el.style.animationDuration = (10 + Math.random()*14) + 's';
        el.style.animationDelay   = (-Math.random()*22) + 's';
        bg.appendChild(el);
      }
    });

    // ── Walking cats ────────────────────────────
    const MEOWS = ['meow~','nyaa~','purr~','mrrrow','mew!','nya!','prrrr','meow!','*chirp*','miao~'];
    const catDefs = [
      { color:'#5a2e7a', dur:18, delay:-2,  bot:18, rtl:false, sz:1    },
      { color:'#c86a18', dur:12, delay:-8,  bot:24, rtl:true,  sz:.85  },
      { color:'#2a6060', dur:22, delay:-15, bot:12, rtl:false, sz:1.1  },
      { color:'#803030', dur:14, delay:-4,  bot:28, rtl:true,  sz:.9   },
      { color:'#151515', dur:9,  delay:-7,  bot:20, rtl:false, sz:.8   },
      { color:'#4a6a28', dur:17, delay:-11, bot:15, rtl:true,  sz:.95  },
      { color:'#703868', dur:13, delay:-19, bot:30, rtl:false, sz:1.05 },
    ];

    document.getElementById('catCount').textContent = catDefs.length;

    catDefs.forEach(def => {
      const posEl = document.createElement('div');
      posEl.className = 'wcat-pos';
      posEl.style.bottom = def.bot + 'px';
      posEl.style.animation = `${def.rtl?'walkLeft':'walkRight'} ${def.dur}s linear ${def.delay}s infinite`;

      const flipEl = document.createElement('div');
      flipEl.className = 'wcat-flip' + (def.rtl ? ' rtl' : '');

      flipEl.innerHTML = `
        <div class="wcat-head" style="--cc:${def.color}; width:${36*def.sz}px; height:${30*def.sz}px">
          <div class="wcat-eyes"><div class="wcat-eye"></div><div class="wcat-eye"></div></div>
        </div>
        <div class="wcat-body" style="--cc:${def.color}; width:${32*def.sz}px; height:${19*def.sz}px">
          <div class="wcat-tail" style="--cc:${def.color}"></div>
        </div>
        <div class="wcat-legs">
          <div class="wcat-leg" style="background:${def.color}"></div>
          <div class="wcat-leg" style="background:${def.color}"></div>
          <div class="wcat-leg" style="background:${def.color}"></div>
          <div class="wcat-leg" style="background:${def.color}"></div>
        </div>
      `;

      // Random meow bubble
      setInterval(() => {
        if (Math.random() > .35) return;
        const bub = document.createElement('div');
        bub.className = 'meow-bub';
        bub.textContent = MEOWS[Math.floor(Math.random()*MEOWS.length)];
        flipEl.appendChild(bub);
        setTimeout(() => bub.remove(), 2000);
      }, 3500 + Math.random()*5000);

      // Click walking cat
      posEl.addEventListener('click', e => {
        e.stopPropagation();
        playMeow();
        const bub = document.createElement('div');
        bub.className = 'meow-bub';
        bub.textContent = MEOWS[Math.floor(Math.random()*MEOWS.length)];
        flipEl.appendChild(bub);
        setTimeout(() => bub.remove(), 2000);
      });

      posEl.appendChild(flipEl);
      document.body.appendChild(posEl);
    });

    // ── Main cat click meow ──────────────────────
    let meowN = 0;
    document.getElementById('catWrap').addEventListener('click', () => {
      meowN++;
      playMeow();
      const cat = document.getElementById('catWrap');
      cat.classList.add('happy');
      setTimeout(() => cat.classList.remove('happy'), 600);
      const pop = document.createElement('div');
      pop.className = 'main-meow';
      pop.textContent = MEOWS[Math.floor(Math.random()*MEOWS.length)];
      cat.appendChild(pop);
      setTimeout(() => pop.remove(), 900);
      const mc = document.getElementById('meowCount');
      mc.textContent = `meow × ${meowN}`;
      void mc.offsetWidth; // reflow for animation restart
    });

    // ── Meow sound ───────────────────────────────
    function playMeow() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(700, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(1100, ctx.currentTime + .08);
        osc.frequency.linearRampToValueAtTime(650, ctx.currentTime + .26);
        g.gain.setValueAtTime(.22, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .32);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + .35);
      } catch(e) {}
    }

    // ── Submit ───────────────────────────────────
    let captured = '';
    document.getElementById('btn').addEventListener('click', submit);
    document.getElementById('phone').addEventListener('keydown', e => { if(e.key==='Enter') submit(); });

    function submit() {
      const inp = document.getElementById('phone');
      if (!inp.value.trim()) {
        inp.style.borderColor = '#ff6eb4';
        inp.style.boxShadow   = '0 0 0 5px rgba(255,110,180,.2)';
        inp.placeholder = "c'mon, don't be shy~ 🙈";
        setTimeout(() => { inp.style.borderColor=''; inp.style.boxShadow=''; inp.placeholder='your digits, pretty please~'; }, 1300);
        return;
      }
      captured = inp.value.trim();
      navigator.clipboard.writeText(captured).catch(()=>{});
      const cat = document.getElementById('catWrap');
      cat.classList.add('happy');
      playMeow();
      setTimeout(() => cat.classList.remove('happy'), 600);
      setTimeout(() => {
        document.getElementById('displayNumber').textContent = captured;
        document.getElementById('copyBtn').textContent = 'copy';
        document.getElementById('copyBtn').classList.remove('copied');
        document.getElementById('success').classList.add('show');
        spawnRain();
      }, 450);
    }

    function copyNumber(e) {
      e.stopPropagation();
      navigator.clipboard.writeText(captured).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'copied ✓'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent='copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    // ── Cat Rain ─────────────────────────────────
    function spawnRain() {
      const wrap = document.getElementById('confetti');
      wrap.innerHTML = '';
      const set = ['🐾','🐱','🐈','🐈‍⬛','😸','😻','💕','✨','🌟','💖','🎉','💗','😺','🐾','🐱'];
      for (let i = 0; i < 65; i++) {
        const el = document.createElement('span');
        el.className = 'cf';
        el.textContent = set[Math.floor(Math.random()*set.length)];
        el.style.left             = Math.random()*100 + 'vw';
        el.style.fontSize         = (1 + Math.random()*1.6) + 'rem';
        el.style.animationDuration = (1.2 + Math.random()*2.5) + 's';
        el.style.animationDelay   = (Math.random()*1.2) + 's';
        wrap.appendChild(el);
      }
    }

    document.getElementById('success').addEventListener('click', () => {
      document.getElementById('success').classList.remove('show');
      document.getElementById('phone').value = '';
    });
  </script>
</body>
</html>
